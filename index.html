<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JUJUTSU CHRONICLES // VESSEL FORGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="jjk_style.css">
  <!-- We can link a modified version of your skillbuilder CSS here later -->
  <style>
    /* Basic overrides for the new layout */
    .char-create-container { max-width: 800px; margin: 2rem auto; padding: 20px; background: #05070a; border: 1px solid #00e5ff; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); font-family: 'Share Tech Mono', monospace; color: #d0e0f0; }
    .form-section { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #151d29; }
    .cc-label { display: block; font-size: 11px; color: #008b99; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
    .cc-input, .cc-select { width: 100%; background: #020304; border: 1px solid #151d29; color: #d0e0f0; padding: 10px; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; }
    .cc-input:focus, .cc-select:focus { border-color: #00e5ff; outline: none; }
    .btn-forge { background: rgba(191, 0, 255, 0.1); border: 1px solid #bf00ff; color: #bf00ff; padding: 12px; width: 100%; cursor: pointer; font-family: inherit; font-size: 14px; letter-spacing: 2px; transition: 0.2s; }
    .btn-forge:hover { background: #bf00ff; color: #fff; box-shadow: 0 0 15px #bf00ff; }
    .btn-start { background: rgba(0, 229, 255, 0.1); border: 1px solid #00e5ff; color: #00e5ff; padding: 14px; width: 100%; cursor: pointer; font-family: inherit; font-size: 16px; letter-spacing: 2px; transition: 0.2s; margin-top: 20px; }
    .btn-start:hover { background: #00e5ff; color: #000; box-shadow: 0 0 20px #00e5ff; }
    .hidden { display: none !important; }
    
    /* BitLife Game UI */
    #gameScreen { display: none; max-width: 900px; margin: 0 auto; height: 100vh; flex-direction: column; background: #020304; color: #d0e0f0; font-family: 'Share Tech Mono'; }
    .header-stats { display: flex; justify-content: space-between; padding: 15px; background: #05070a; border-bottom: 1px solid #151d29; }
    .stat-box { text-align: center; }
    .stat-label { font-size: 10px; color: #008b99; display: block; }
    .stat-val { font-family: 'VT323'; font-size: 24px; color: #00e5ff; }
    .timeline-log { flex: 1; overflow-y: auto; padding: 20px; }
    .timeline-entry { margin-bottom: 15px; padding-left: 15px; border-left: 2px solid #151d29; }
    .timeline-age { font-size: 10px; color: #bf00ff; margin-bottom: 4px; display: block; }
    .action-bar { padding: 20px; background: #05070a; border-top: 1px solid #151d29; }
    .time-slider-container { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
  </style>
</head>
<body>

<!-- CHARACTER CREATION -->
<div id="charCreateScreen">
  <div class="char-create-container">
    <h1 style="font-family: 'VT323'; font-size: 32px; color: #00e5ff; margin-top: 0; text-align: center;">VESSEL INITIALIZATION</h1>
    
    <!-- Identity -->
    <div class="form-section">
      <label class="cc-label">FIRST NAME</label>
      <input type="text" id="ccFirstName" class="cc-input" placeholder="e.g. Kenji, Akira, Yuki...">
      
      <label class="cc-label">CLAN / LINEAGE (LAST NAME)</label>
      <select id="ccClan" class="cc-select" onchange="toggleClanForge()">
        <option value="random">Civilian (Random Last Name)</option>
        <option value="Zenin">Zenin Clan</option>
        <option value="Gojo">Gojo Clan</option>
        <option value="Kamo">Kamo Clan</option>
        <option value="Inumaki">Inumaki Clan</option>
        <option value="custom">-- FORGE CUSTOM CLAN --</option>
      </select>

      <div id="customClanPanel" class="hidden" style="padding: 15px; border: 1px dashed #008b99; margin-bottom: 10px;">
        <label class="cc-label">CUSTOM CLAN NAME</label>
        <input type="text" id="ccCustomClanName" class="cc-input" placeholder="e.g. Watanabe">
        <label class="cc-label">INHERITED BLOODLINE TRAIT</label>
        <select id="ccCustomClanTrait" class="cc-select">
          <option value="immense_ce">Deep Reserves (+Max CE)</option>
          <option value="heavenly">Heavenly Restriction (0 CE, Godlike Physicals)</option>
          <option value="rct_talent">RCT Affinity (Easier time learning healing)</option>
        </select>
      </div>
    </div>

    <!-- History & Awakening -->
    <div class="form-section">
      <label class="cc-label">UPBRINGING</label>
      <select id="ccUpbringing" class="cc-select">
        <option value="sheltered">Sheltered Civilian (Balanced, low starting trauma)</option>
        <option value="slums">Slum Scavenger (High survivability, low resources)</option>
        <option value="cult">Curse User Cult (High combat knowledge, negative reputation)</option>
        <option value="traditional">Traditional Sorcerer Family (High mastery, immense pressure)</option>
      </select>

      <label class="cc-label">CURSED ENERGY EXPOSURE (AWAKENING)</label>
      <select id="ccExposure" class="cc-select">
        <option value="birth">Innate Awareness (Saw curses since birth)</option>
        <option value="trauma">Near-Death Experience (Awakened during a fatal incident)</option>
        <option value="ingestion">Cursed Object Ingestion (Forced awakening, volatile CE)</option>
        <option value="curse_attack">Survivor of a Curse Attack (High fear, high drive)</option>
      </select>
    </div>

    <!-- Technique Forge -->
    <div class="form-section" style="border: none;">
      <label class="cc-label">INNATE CURSED TECHNIQUE</label>
      <button class="btn-forge" id="btnForgeCT">⚙ OPEN TECHNIQUE FORGE</button>
      <div id="ctStatus" style="font-size: 11px; color: #525a66; margin-top: 8px; text-align: center;">No custom technique forged. Defaulting to raw CE manipulation.</div>
    </div>

    <button id="btnAwaken" class="btn-start">SYNCHRONIZE & START LIFELINE</button>
  </div>
</div>

<!-- GAME UI (BITLIFE STYLE) -->
<div id="gameScreen">
  <div class="header-stats">
    <div class="stat-box"><span class="stat-label">NAME</span><span class="stat-val" id="uiName" style="color:#d0e0f0;">Subject</span></div>
    <div class="stat-box"><span class="stat-label">AGE</span><span class="stat-val" id="uiAge">15</span></div>
    <div class="stat-box"><span class="stat-label">HP</span><span class="stat-val" id="uiHp" style="color:#ff2a55;">100/100</span></div>
    <div class="stat-box"><span class="stat-label">CE</span><span class="stat-val" id="uiCe">50/50</span></div>
    <div class="stat-box"><span class="stat-label">GRADE</span><span class="stat-val" id="uiGrade">4</span></div>
    <div class="stat-box"><span class="stat-label">YEN</span><span class="stat-val" id="uiYen" style="color:#ffb300;">0</span></div>
  </div>

  <div class="timeline-log" id="timelineLog">
    <!-- Life events populate here -->
  </div>

  <div class="action-bar">
    <div class="time-slider-container">
      <div style="width: 80px;"><span class="stat-label">PASS TIME</span></div>
      <input type="range" id="timeSlider" min="1" max="12" value="1" style="flex: 1;">
      <div style="width: 70px; text-align: right;"><span id="timeVal" style="font-family:'VT323'; font-size:20px; color:#00e5ff;">1 MO</span></div>
      <button class="btn-start" id="btnPassTime" style="margin-top: 0; width: auto; padding: 10px 20px;">ADVANCE</button>
    </div>
    <div style="display: flex; gap: 10px;">
      <button class="btn-forge" style="flex:1; border-color:#008b99; color:#008b99;">TRAIN STATS</button>
      <button class="btn-forge" style="flex:1; border-color:#008b99; color:#008b99;">RELATIONSHIPS</button>
      <button class="btn-forge" style="flex:1; border-color:#ff2a55; color:#ff2a55;">HUNT CURSES</button>
    </div>
  </div>
</div>

<script src="jjk_engine.js"></script>
<script src="jjk_skillBuilder.js"></script>
</body>
</html>
